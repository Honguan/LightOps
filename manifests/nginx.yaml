name: nginx
display_name: Nginx
description: High-performance web server and reverse proxy
category: web-server
packages:
  apt-get: [nginx]
  dnf: [nginx]
  yum: [nginx]
service: {name: nginx}
ports: [80, 443]
config_paths: [/etc/nginx/nginx.conf, /etc/nginx/conf.d]
log_paths: [/var/log/nginx/access.log, /var/log/nginx/error.log]
